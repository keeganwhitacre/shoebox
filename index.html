
<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Stream">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>Stream</title>

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23000'/%3E%3Cpath d='M160 256 Q 256 160 352 256 Q 256 352 160 256' fill='none' stroke='%23fff' stroke-width='32' stroke-linecap='round'/%3E%3C/svg%3E">

    <style>
        :root {
            --bg: #ffffff;
            --surface: #f2f2f7; 
            --text-main: #000000;
            --text-muted: #8e8e93;
            --border: #e5e5ea;
            --accent: #000000; 
            --danger: #ff3b30;
            --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #1c1c1e;
                --text-main: #ffffff;
                --text-muted: #636366;
                --border: #38383a;
                --accent: #ffffff;
                --danger: #ff453a;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            overflow: hidden; 
        }

        button { font-family: inherit; }

        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .view.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Header --- */
        header {
            padding: calc(1rem + env(safe-area-inset-top)) 1.5rem 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: var(--bg);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem;
            margin: -0.5rem;
            transition: color 0.2s;
        }
        .btn-text:active { color: var(--text-main); }

        /* --- Idle View --- */
        #archive {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.5rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            -webkit-overflow-scrolling: touch;
        }

        .empty-state {
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: center;
        }

        .empty-state .subtext {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .log-entry {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .log-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .log-text {
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-main);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Controller */
        #setup-bar {
            padding: 1rem 1.5rem calc(1rem + env(safe-area-inset-bottom)) 1.5rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-shrink: 0;
        }

        .time-picker {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 12px;
            padding: 0 1rem;
            height: 3rem;
            border: 1px solid var(--border);
        }

        .time-picker input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.25rem;
            font-weight: 600;
            width: 2.5rem;
            text-align: center;
            outline: none;
            padding: 0;
            font-family: inherit;
        }
        
        .time-picker input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        
        .time-picker span {
            color: var(--text-muted);
            font-size: 1rem;
            margin-left: 0.25rem;
            font-weight: 500;
        }

        /* Burn Mode Toggle */
        .btn-toggle {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            height: 3rem;
            padding: 0 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-toggle.active {
            color: var(--danger);
            border-color: var(--danger);
            background: rgba(255, 59, 48, 0.05);
        }

        .btn-start {
            flex: 1;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            height: 3rem;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .btn-start:active { transform: scale(0.97); }

        /* --- Active Session View --- */
        #session-header {
            padding: calc(1rem + env(safe-area-inset-top)) 1.5rem 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg);
        }

        #timer {
            font-size: 1.5rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            transition: color 0.3s;
            color: var(--text-main);
        }

        #active-stack {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            -webkit-overflow-scrolling: touch;
        }

        .stack-item {
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-muted);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #input-area {
            padding: 1rem 1.5rem calc(1rem + env(safe-area-inset-bottom)) 1.5rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #stream-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.25rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            padding: 0;
            min-height: 3rem;
            max-height: 25vh;
            font-family: inherit;
        }

        #stream-input::placeholder { color: var(--text-muted); opacity: 0.5; }

    </style>
</head>
<body>

    <div id="app">
        
        <div id="view-idle" class="view active">
            <header>
                <div class="logo">Stream</div>
                <button id="btn-clear" class="btn-text">Clear</button>
            </header>

            <div id="archive"></div>
            
            <div id="setup-bar">
                <div class="time-picker">
                    <input type="number" id="time-input" placeholder="∞" min="1" max="60" inputmode="numeric">
                    <span>min</span>
                </div>
                <button id="btn-burn" class="btn-toggle">Save</button>
                <button id="btn-start" class="btn-start">Start</button>
            </div>
        </div>

        <div id="view-active" class="view">
            <div id="session-header">
                <div id="timer">∞</div>
                <button id="btn-end" class="btn-text" style="color: var(--danger);">End Session</button>
            </div>

            <div id="active-stack"></div>

            <div id="input-area">
                <textarea 
                    id="stream-input" 
                    placeholder="Keep moving..."
                    spellcheck="false"
                    autocomplete="off"
                ></textarea>
            </div>
        </div>

    </div>

    <script>
        const viewIdle = document.getElementById('view-idle');
        const viewActive = document.getElementById('view-active');
        const archiveList = document.getElementById('archive');
        const activeStack = document.getElementById('active-stack');
        const timeInput = document.getElementById('time-input');
        const streamInput = document.getElementById('stream-input');
        const timerDisplay = document.getElementById('timer');
        const btnStart = document.getElementById('btn-start');
        const btnEnd = document.getElementById('btn-end');
        const btnClear = document.getElementById('btn-clear');
        const btnBurn = document.getElementById('btn-burn');

        const FADE_START_MS = 2500; 
        const FADE_DURATION_MS = 2500; 
        const ONE_DAY_MS = 24 * 60 * 60 * 1000;
        
        let logs = [];
        let sessionLogs = []; 
        let sessionTimer = null;
        let fadeLoop = null;
        let sessionEndTime = 0;
        let isInfinite = false;
        let isBurnMode = false;
        let lastTypeTime = 0;
        let isTyping = false;

        // --- Initialization & Auto-Purge ---
        function initData() {
            const rawData = localStorage.getItem('stream_data_final');
            if (rawData) {
                const parsed = JSON.parse(rawData);
                const now = Date.now();
                logs = parsed.filter(log => (now - new Date(log.timestamp).getTime()) < ONE_DAY_MS);
                
                if (logs.length !== parsed.length) {
                    localStorage.setItem('stream_data_final', JSON.stringify(logs));
                }
            }
        }

        function formatRelativeTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffDays = Math.floor((now - date) / ONE_DAY_MS);
            const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            if (diffDays === 0 && now.getDate() === date.getDate()) return `Today at ${timeStr}`;
            if (diffDays === 1 || (diffDays === 0 && now.getDate() !== date.getDate())) return `Yesterday at ${timeStr}`;
            return `${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} at ${timeStr}`;
        }

        function formatCountdown(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function renderArchive() {
            archiveList.innerHTML = '';
            if (logs.length === 0) {
                archiveList.innerHTML = `
                    <div class="empty-state">
                        <p>No thoughts captured.</p>
                        <p class="subtext">Logs auto-purge after 24 hours.</p>
                    </div>`;
                return;
            }

            logs.forEach(log => {
                const el = document.createElement('div');
                el.className = 'log-entry';
                el.innerHTML = `
                    <div class="log-time">${formatRelativeTime(log.timestamp)}</div>
                    <div class="log-text">${log.text}</div>
                `;
                archiveList.appendChild(el);
            });
            setTimeout(() => { archiveList.scrollTop = archiveList.scrollHeight; }, 10);
        }

        // --- Session Logic ---
        function toggleBurnMode() {
            isBurnMode = !isBurnMode;
            if (isBurnMode) {
                btnBurn.classList.add('active');
                btnBurn.textContent = 'Burn';
            } else {
                btnBurn.classList.remove('active');
                btnBurn.textContent = 'Save';
            }
        }

        function startSession() {
            const val = timeInput.value.trim();
            let mins = parseInt(val);
            
            isInfinite = (!val || isNaN(mins) || mins <= 0);

            viewIdle.classList.remove('active');
            viewActive.classList.add('active');
            activeStack.innerHTML = ''; 
            sessionLogs = []; 

            if (isInfinite) {
                timerDisplay.textContent = '∞';
                timerDisplay.style.color = 'var(--text-main)';
            } else {
                sessionEndTime = Date.now() + (mins * 60 * 1000);
                updateTimerUI(mins * 60);
                sessionTimer = setInterval(tickSession, 1000);
            }
            
            streamInput.value = '';
            streamInput.style.opacity = 1;
            streamInput.style.height = 'auto';
            isTyping = false;
            
            setTimeout(() => streamInput.focus(), 50);
        }

        function endSession() {
            if (sessionTimer) {
                clearInterval(sessionTimer);
                sessionTimer = null;
            }
            cancelAnimationFrame(fadeLoop);
            
            commitThought(); 

            // Burn Mode
            if (!isBurnMode && sessionLogs.length > 0) {
                logs = logs.concat(sessionLogs);
                localStorage.setItem('stream_data_final', JSON.stringify(logs));
            }

            viewActive.classList.remove('active');
            viewIdle.classList.add('active');
            renderArchive();
        }

        function tickSession() {
            if (isInfinite) return;
            const remaining = Math.max(0, Math.ceil((sessionEndTime - Date.now()) / 1000));
            updateTimerUI(remaining);
            if (remaining <= 0) endSession();
        }

        function updateTimerUI(remaining) {
            timerDisplay.textContent = formatCountdown(remaining);
            if (remaining <= 10) {
                timerDisplay.style.color = 'var(--danger)';
            } else {
                timerDisplay.style.color = 'var(--text-main)';
            }
        }

        // --- Typing & Fading Logic ---
        function handleType() {
            isTyping = true;
            lastTypeTime = Date.now();
            streamInput.style.opacity = 1;
            
            streamInput.style.height = 'auto';
            streamInput.style.height = Math.min(streamInput.scrollHeight, window.innerHeight * 0.3) + 'px';

            if (!fadeLoop) checkFade();
        }

        function checkFade() {
            if (!isTyping || streamInput.value.trim() === '') {
                fadeLoop = null;
                return;
            }

            const elapsed = Date.now() - lastTypeTime;

            if (elapsed > FADE_START_MS) {
                const fadeProgress = (elapsed - FADE_START_MS) / FADE_DURATION_MS;
                
                if (fadeProgress >= 1) {
                    streamInput.value = '';
                    streamInput.style.opacity = 1;
                    streamInput.style.height = 'auto';
                    isTyping = false;
                    fadeLoop = null;
                    return;
                } else {
                    streamInput.style.opacity = 1 - Math.pow(fadeProgress, 2);
                }
            } else {
                streamInput.style.opacity = 1;
            }
            fadeLoop = requestAnimationFrame(checkFade);
        }

        function commitThought() {
            const text = streamInput.value.trim();
            if (text) {
                const newLog = { text: text, timestamp: new Date().toISOString() };
                sessionLogs.push(newLog);
                
                const el = document.createElement('div');
                el.className = 'stack-item';
                el.textContent = text;
                activeStack.appendChild(el);
                activeStack.scrollTop = activeStack.scrollHeight;
            }
            streamInput.value = '';
            streamInput.style.opacity = 1;
            streamInput.style.height = 'auto';
            isTyping = false;
        }

        // --- Event Listeners ---
        btnBurn.addEventListener('click', toggleBurnMode);
        btnStart.addEventListener('click', startSession);
        btnEnd.addEventListener('click', endSession);

        streamInput.addEventListener('beforeinput', (e) => {
            if (e.inputType.includes('delete')) {
                e.preventDefault();
                handleType();
            }
        });

        streamInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Delete') e.preventDefault();
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
            
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                commitThought();
            }
        });

        streamInput.addEventListener('input', handleType);

        btnClear.addEventListener('click', () => {
            if(confirm('Clear all stored thoughts?')) {
                logs = [];
                localStorage.removeItem('stream_data_final');
                renderArchive();
            }
        });

        document.getElementById('view-active').addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                streamInput.focus();
            }
        });

        // Boot
        initData();
        renderArchive();
    </script>
</body>
</html>
